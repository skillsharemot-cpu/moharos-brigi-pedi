<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpontfoglalás | MB Pedikűr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ─── Variables ─── */
        :root {
            --gold:        #BA9863;
            --gold-mid:    #C8A870;
            --dark:        #1A1716;
            --cream:       #FAFAF7;
            --warm:        #F4EDE0;
            --text:        #2A2220;
            --text-muted:  #7A6E68;
            --white:       #FFFFFF;
            --font:        'Outfit', sans-serif;
            --ease:        cubic-bezier(0.25, 0.8, 0.25, 1);
            --radius-md:   16px;
        }

        /* ─── Reset ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background-color: var(--cream);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 120px; /* Space for sticky footer */
        }
        a { text-decoration: none; color: inherit; }

        /* ─── Header Minimal ─── */
        header {
            padding: 0 40px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--white);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-img { height: 40px; object-fit: contain; }
        .back-link {
            font-size: 0.85rem; font-weight: 600; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }

        /* ─── Main Content ─── */
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        .page-title {
            text-align: center; margin-bottom: 40px;
        }
        .page-title h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 300;
        }
        .page-title h1 strong { font-weight: 700; color: var(--gold); }
        .page-title p {
            font-size: 0.95rem; color: var(--text-muted); margin-top: 10px;
        }

        /* ─── Services List ─── */
        .service-group { margin-bottom: 30px; }
        
        .service-row {
            background: var(--white);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s var(--ease);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            position: relative;
        }
        .service-row:hover { border-color: rgba(186,152,99,0.3); }
        .service-row.selected {
            border-color: var(--gold);
            background-color: var(--warm);
        }

        /* Custom Checkbox */
        .checkbox-wrapper {
            position: relative;
            width: 24px; height: 24px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .checkbox-wrapper input {
            position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0;
        }
        .checkmark {
            position: absolute; top: 0; left: 0; height: 24px; width: 24px;
            background-color: var(--white);
            border: 2px solid #E0DCD6;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .service-row.selected .checkmark {
            background-color: var(--gold); border-color: var(--gold);
        }
        .service-row.selected .checkmark::after {
            content: ""; width: 6px; height: 12px;
            border: solid white; border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* Content */
        .service-content { flex: 1; display: flex; flex-direction: column; }
        .service-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;}
        .service-header h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .service-price { font-weight: 700; color: var(--gold); font-size: 1.1rem; white-space: nowrap; }
        
        .service-details { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px;}
        .service-meta { display: flex; gap: 12px; font-size: 0.8rem; font-weight: 500; color: var(--dark); }
        .service-meta span { display: flex; align-items: center; gap: 4px; }
        .service-meta svg { width: 14px; height: 14px; fill: currentColor; }

        /* ─── Sticky Footer ─── */
        .sticky-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--dark);
            color: var(--white);
            padding: 24px 40px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .summary h4 { font-size: 0.9rem; font-weight: 400; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .summary p { font-size: 1.4rem; font-weight: 700; }
        .summary p span { font-weight: 300; font-size: 1rem; color: var(--gold-mid); margin-left: 8px;}
        
        .btn {
            background-color: var(--gold); color: var(--white);
            padding: 16px 40px; border-radius: 50px;
            font-family: var(--font); font-size: 0.9rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; border: none;
            transition: background-color 0.3s var(--ease), transform 0.2s var(--ease);
        }
        .btn:hover { background-color: var(--white); color: var(--dark); transform: translateY(-2px); }
        .btn:disabled { background-color: #555; color: #888; cursor: not-allowed; transform: none; }

        @media (max-width: 600px) {
            .container { padding: 30px 16px; }
            .service-header { flex-direction: column; }
            .sticky-footer { flex-direction: column; gap: 20px; padding: 20px; text-align: center; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">
            <img src="Logo.jpg" alt="MB Pedikűr logó" class="logo-img" onerror="this.src=''; this.alt='MB Pedikűr'; this.style.fontSize='1.2rem'; this.style.fontWeight='bold';">
        </a>
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Vissza a főoldalra
        </a>
    </header>

    <main class="container">
        <div class="page-title">
            <h1>Kezelés <strong>kiválasztása</strong></h1>
            <p>Válaszd ki a kívánt szolgáltatásokat, és mi kiszámoljuk a várható időtartamot.</p>
        </div>

        <div class="service-group" id="services-container">
            <!-- Services will be injected here by JS -->
        </div>
    </main>

    <div class="sticky-footer">
        <div class="summary">
            <h4>Kiválasztva: <span id="selected-count">0</span> szolgáltatás</h4>
            <p><span id="total-price">0 Ft</span><span id="total-time">(0 perc)</span></p>
        </div>
        <button class="btn" id="next-btn" disabled onclick="finalizeBooking()">Tovább a foglaláshoz &rarr;</button>
    </div>

    <script>
        const services = [
            { id: "esztetikai", title: "Esztétikai pedikűr /szikés vagy gépi/", desc: "Frissítő lábápolás, szikés vagy gépi technikával az ápolt és puha lábakért.", time: 60, price: 7200 },
            { id: "callux", title: "Callux szike nélküli lábápolás", desc: "Teljesen fájdalommentes, gyümölcssavas peeling technológiával történő luxus lábápolás.", time: 60, price: 8000 },
            { id: "benottkorom", title: "Benőtt köröm kezelés", desc: "Fájdalom megszüntetése, a gyulladt, benőtt körömszél szakszerű eltávolítása.", time: 20, price: 2000 },
            { id: "tyukszem", title: "Tyúkszemeltávolítás - tehermentesítés", desc: "Fájdalommentesítés, a tyúkszem mechanikai kiemelése és utókezelése.", time: 20, price: 2300 },
            { id: "gellakk", title: "Gél lakk", desc: "Tartós, esztétikus és csillogó lakkozás.", time: 45, price: 6300 },
            { id: "gellakk_eltavolitas", title: "Gél lakk eltávolítás", desc: "Meglévő lakk szakszerű és körömkímélő leoldása / csiszolása.", time: 15, price: 2500 },
            { id: "koromrovidites", title: "Körömrövidítés", desc: "Lábkörmök gyors, szakszerű rövidítése és formázása.", time: 15, price: 1000 }
        ];

        const container = document.getElementById('services-container');
        const countEl = document.getElementById('selected-count');
        const priceEl = document.getElementById('total-price');
        const timeEl = document.getElementById('total-time');
        const nextBtn = document.getElementById('next-btn');

        let selectedServices = [];

        // Restore from local storage if exists
        try {
            const saved = localStorage.getItem('mb_pedikur_selected');
            if(saved) selectedServices = JSON.parse(saved);
        } catch(e) {}

        function renderServices() {
            container.innerHTML = '';
            services.forEach(srv => {
                const isSelected = selectedServices.includes(srv.id);
                
                const row = document.createElement('label');
                row.className = `service-row ${isSelected ? 'selected' : ''}`;
                
                row.innerHTML = `
                    <div class="checkbox-wrapper">
                        <input type="checkbox" value="${srv.id}" ${isSelected ? 'checked' : ''} onchange="toggleService(this)">
                        <div class="checkmark"></div>
                    </div>
                    <div class="service-content">
                        <div class="service-header">
                            <h3>${srv.title}</h3>
                            <div class="service-price">${srv.price.toLocaleString('hu-HU')} Ft</div>
                        </div>
                        <div class="service-details">${srv.desc}</div>
                        <div class="service-meta">
                            <span>
                                <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
                                ${srv.time} perc
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
            updateSummary();
        }

        window.toggleService = function(checkbox) {
            const row = checkbox.closest('.service-row');
            if(checkbox.checked) {
                row.classList.add('selected');
                if(!selectedServices.includes(checkbox.value)) {
                    selectedServices.push(checkbox.value);
                }
            } else {
                row.classList.remove('selected');
                selectedServices = selectedServices.filter(id => id !== checkbox.value);
            }
            updateSummary();
        };

        function updateSummary() {
            let totalTime = 0;
            let totalPrice = 0;
            
            selectedServices.forEach(id => {
                const srv = services.find(s => s.id === id);
                if(srv) {
                    totalTime += srv.time;
                    totalPrice += srv.price;
                }
            });

            countEl.textContent = selectedServices.length;
            priceEl.textContent = totalPrice > 0 ? `${totalPrice.toLocaleString('hu-HU')} Ft` : '0 Ft';
            timeEl.textContent = totalTime > 0 ? `(kb. ${totalTime} perc)` : '(0 perc)';
            
            if(selectedServices.length > 0) {
                nextBtn.removeAttribute('disabled');
            } else {
                nextBtn.setAttribute('disabled', 'true');
            }

            // Save state to be persistent
            localStorage.setItem('mb_pedikur_selected', JSON.stringify(selectedServices));
        }

        window.finalizeBooking = function() {
            // Save final data for GoHighLevel integration
            const finalData = selectedServices.map(id => services.find(s => s.id === id));
            localStorage.setItem('mb_pedikur_booking_data', JSON.stringify(finalData));
            
            // Redirect or open widget (GHL)
            alert("A rendszer most ánavigálna a naptárhoz (GoHighLevel Widget). A kiválasztott adatok mentve amiket az iFrame is ki tud majd olvasni a localStorage-ből.");
            
            // Pl. window.location.href = "ghl_calendar.html"; 
            // vagy ghl_open_modal();
        };

        // Init
        renderServices();
    </script>
</body>
</html>
